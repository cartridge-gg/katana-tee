name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      # Scope to first-party packages — `--all` reaches into the vendored
      # submodule crates (path deps), which keep their own formatting.
      - run: cargo fmt -p amd_tee_registry_client -p katana_tee_client -p tee_deploy --check

  rust-test:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # protoc is needed transitively (prost-build) to build the SP1 network deps.
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      # Runs every workspace test that does not need live infra. Tests that hit
      # the network (AMD KDS, Sepolia RPC, SP1 prover network) are marked
      # `#[ignore]` and excluded here; run them locally with `cargo test -- --ignored`.
      - name: Run workspace tests
        run: cargo test --workspace --locked

  cairo-test:
    name: Cairo tests (snforge)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: "2.15.0"
      - uses: foundry-rs/setup-snfoundry@v4
        with:
          starknet-foundry-version: "0.54.1"
      # Fork tests are `#[ignore] #[fork("MAINNET")]`; the placeholder keeps the
      # `$MAINNET_RPC_URL` fork config in Scarb.toml parseable. Run the fork suite
      # locally with `make test-fork` and a real RPC.
      - name: Run snforge tests
        run: snforge test --workspace
        env:
          MAINNET_RPC_URL: https://placeholder.invalid
